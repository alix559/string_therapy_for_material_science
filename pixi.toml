[workspace]
authors = ["Alex <alixjcob559@gmail.com>"]
channels = ["conda-forge"]
name = "string_therapy_for_material_science"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
serve-settings = { cmd = "python serve_settings.py", cwd = "services" }  # MAX settings on :8011
# mat-gram / SMI-TED MAX HTTP API (lives in material-grammar/max_ports)
api = "pixi run --manifest-path /root/mojo_projects/material_grammar/max_ports/pixi.toml api"

main = "pixi run python -m string_therapy_for_material_science.main01"

[dependencies]
python = ">=3.13,<3.14"
nbdev = ">=3.2.2,<4"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.3.0,<8"
monsterui = ">=1.0.19,<2"
plotly = ">=6.9.0,<7"
numpy = ">=2.5.1,<3"
pandas = ">=3.0.3,<4"
scikit-learn = ">=1.9.0,<2"
httpx = ">=0.28.1,<0.29"

[pypi-dependencies]
# Local browse-first controller (sibling checkout). Survives pixi install.
string-therapy = { path = "../string_therapy", editable = true }
langgraph = ">=0.4.0,<1"
langchain-core = ">=0.3.0,<1"
lisette = ">=0.1.35,<0.2"
