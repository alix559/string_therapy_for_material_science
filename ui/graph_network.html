<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Router graph</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222c;
      --ink: #e8eef4;
      --muted: #8b9aab;
      --line: #2a3542;
      --category: #3d9bfd;
      --accent: #f0b429;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
    }
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #161d26 0%, var(--panel) 100%);
    }
    header h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .legend {
      margin-left: auto;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .legend span { display: inline-flex; align-items: center; gap: 0.4rem; }
    .swatch {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      display: inline-block;
    }
    .swatch.category { background: var(--category); }
    .close-dash {
      display: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .close-dash:hover { border-color: var(--category); color: #fff; }
    .shell.is-split .close-dash { display: inline-flex; }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-areas: "graph";
      min-height: 0;
      height: 100%;
      transition: grid-template-columns 0.28s ease;
    }
    /* Left = graph viz · Right = Plotly dashboard */
    .shell.is-split .workspace {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-areas: "graph dashboard";
    }

    #graph {
      grid-area: graph;
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(61, 155, 253, 0.14), transparent 55%),
        var(--bg);
    }
    .shell.is-split #graph {
      border-right: 1px solid var(--line);
    }
    .pane-label {
      position: absolute;
      top: 0.65rem;
      left: 0.75rem;
      z-index: 4;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
    }

    #dashboard {
      grid-area: dashboard;
      display: none;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: var(--panel);
    }
    .shell.is-split #dashboard {
      display: flex;
    }
    .dash-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.85rem;
      border-bottom: 1px solid var(--line);
      background: #161d26;
      flex-shrink: 0;
    }
    .dash-bar strong {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .dash-bar .meta {
      color: var(--muted);
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dash-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--line);
      background: #121820;
      flex-shrink: 0;
      max-height: 5.5rem;
      overflow: auto;
    }
    .dash-tab {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.28rem 0.7rem;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .dash-tab:hover { color: var(--ink); border-color: var(--category); }
    .dash-tab.is-active {
      color: #0b1015;
      background: var(--category);
      border-color: var(--category);
      font-weight: 600;
    }
    .dash-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
      background: #121820;
      position: relative;
    }
    .dash-status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1.5rem;
      text-align: center;
      z-index: 2;
      background: #121820;
    }
    .dash-status.error { color: #f87171; }
    .dash-status[hidden] { display: none; }
    #plotly-chart {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    svg { width: 100%; height: 100%; display: block; touch-action: none; }
    .node circle {
      fill: var(--category);
      stroke: #0b1015;
      stroke-width: 2px;
      cursor: pointer;
      transition: r 0.15s ease, filter 0.15s ease;
    }
    .node:hover circle,
    .node.is-active circle {
      filter: drop-shadow(0 0 10px rgba(61, 155, 253, 0.55));
    }
    .node.is-active circle { stroke: var(--accent); stroke-width: 2.5px; }
    .node text {
      fill: var(--ink);
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
    }
    .node .hint {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 400;
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      max-width: 320px;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(26, 34, 44, 0.96);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      font-size: 0.8rem;
      line-height: 1.45;
      transition: opacity 0.12s ease;
      z-index: 5;
    }
    .tooltip strong { color: var(--accent); font-weight: 600; }
    .tooltip .meta { color: var(--muted); margin-top: 0.35rem; }
    .status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      pointer-events: none;
    }
    .status.error { color: #f87171; }

    @media (max-width: 720px) {
      .shell.is-split .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 42% 1fr;
        grid-template-areas:
          "graph"
          "dashboard";
      }
      .shell.is-split #graph {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <header>
      <h1>Router graph</h1>
      <p id="header-hint">Touch the category node → left stays graph viz, right loads Plotly dashboards</p>
      <div class="legend">
        <span><i class="swatch category"></i> category</span>
        <button type="button" class="close-dash" id="close-dash" title="Close dashboard">Close dashboard</button>
      </div>
    </header>
    <div class="workspace" id="workspace">
      <div id="graph">
        <div class="pane-label">Graph viz</div>
        <div class="status" id="status">Loading graph…</div>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <aside id="dashboard" aria-label="Plotly dashboard">
        <div class="dash-bar">
          <strong id="dash-title">Plotly</strong>
          <span class="meta" id="dash-meta"></span>
        </div>
        <div class="dash-tabs" id="dash-tabs" hidden></div>
        <div class="dash-body" id="dash-body" hidden>
          <div class="dash-status" id="dash-status">Select a visualization…</div>
          <div id="plotly-chart"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Notebook / FastHTML injects JSON by replacing null (or the whole script body). -->
  <script id="graph-data" type="application/json">null</script>

  <script>
    const GRAPH_FALLBACK_URLS = [
      "../routes/router_graph.json",
      "/routes/router_graph.json",
    ];

    const PLOTLY_LAYOUT_DEFAULTS = {
      paper_bgcolor: "#121820",
      plot_bgcolor: "#121820",
      font: { color: "#e8eef4", family: "IBM Plex Sans, Segoe UI, system-ui, sans-serif" },
      margin: { t: 48, r: 24, b: 48, l: 56 },
      xaxis: { gridcolor: "#2a3542", zerolinecolor: "#2a3542" },
      yaxis: { gridcolor: "#2a3542", zerolinecolor: "#2a3542" },
      colorway: ["#3d9bfd", "#f0b429", "#34d399", "#f87171"],
    };

    async function loadGraph() {
      if (window.GRAPH_DATA && window.GRAPH_DATA.nodes) return window.GRAPH_DATA;

      const el = document.getElementById("graph-data");
      if (el) {
        const raw = (el.textContent || "").trim();
        if (raw && raw !== "null") {
          const data = JSON.parse(raw);
          if (data && data.nodes) return data;
        }
      }

      let lastErr;
      for (const url of GRAPH_FALLBACK_URLS) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`${url} → HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error("No graph data available");
    }

    function endpointsForCategory(graph, category) {
      const byId = new Map(graph.nodes.map((n) => [n.id, n]));
      return (graph.edges || [])
        .filter((e) => e.source === category.id)
        .map((e) => byId.get(e.target))
        .filter((n) => n && n.node_type === "endpoint");
    }

    function shortLabel(intent) {
      return String(intent || "viz")
        .replace(/^solubility_/, "")
        .replace(/^settings_/, "")
        .replace(/_/g, " ");
    }

    function tooltipHtml(d, endpoints) {
      const kind = d.intent === "settings" ? "settings" : "Plotly";
      return [
        `<strong>${d.intent || d.id}</strong>`,
        `<div>${d.description || ""}</div>`,
        `<div class="meta">${endpoints.length} ${kind} endpoint${endpoints.length === 1 ? "" : "s"} · touch to open</div>`,
      ].join("");
    }

    function legacyPlotToFigure(payload) {
      const plot = payload.plot || {};
      const kind = (payload.visualization || plot.type || "").toLowerCase();

      if (kind === "scatter" || plot.points) {
        const points = plot.points || [];
        return {
          data: [{
            type: "scatter",
            mode: "lines+markers",
            x: points.map((p) => p.x),
            y: points.map((p) => p.y),
            marker: { size: 10, color: "#3d9bfd" },
            line: { color: "#3d9bfd" },
          }],
          layout: {
            title: "Solubility scatter",
            xaxis: { title: plot.x_label || "x" },
            yaxis: { title: plot.y_label || "y" },
          },
        };
      }

      if (kind === "heatmap" || plot.z != null) {
        return {
          data: [{
            type: "heatmap",
            x: plot.x || [],
            y: (plot.y || []).map(String),
            z: plot.z || [],
            colorscale: "YlGnBu",
            colorbar: { title: plot.z_label || "z" },
          }],
          layout: {
            title: "Solubility heatmap",
            xaxis: { title: plot.x_label || "x" },
            yaxis: { title: plot.y_label || "y" },
          },
        };
      }

      if (kind.includes("time") || plot.series) {
        const series = plot.series || [];
        return {
          data: [{
            type: "scatter",
            mode: "lines+markers",
            x: series.map((p) => p.t),
            y: series.map((p) => p.y),
            marker: { size: 9, color: "#f0b429" },
            line: { color: "#f0b429", width: 3 },
          }],
          layout: {
            title: "Solubility timeseries",
            xaxis: { title: plot.x_label || "t" },
            yaxis: { title: plot.y_label || "y" },
          },
        };
      }

      return null;
    }

    function figureFromResponse(payload) {
      if (payload && payload.plotly && Array.isArray(payload.plotly.data)) {
        return {
          data: payload.plotly.data,
          layout: { ...PLOTLY_LAYOUT_DEFAULTS, ...(payload.plotly.layout || {}) },
        };
      }
      const legacy = legacyPlotToFigure(payload || {});
      if (!legacy) return null;
      return {
        data: legacy.data,
        layout: { ...PLOTLY_LAYOUT_DEFAULTS, ...legacy.layout },
      };
    }

    function mergeAxisTheme(layout) {
      const out = { ...PLOTLY_LAYOUT_DEFAULTS, ...layout };
      out.xaxis = { ...PLOTLY_LAYOUT_DEFAULTS.xaxis, ...(layout.xaxis || {}) };
      out.yaxis = { ...PLOTLY_LAYOUT_DEFAULTS.yaxis, ...(layout.yaxis || {}) };
      return out;
    }

    function render(graph) {
      const shell = document.getElementById("shell");
      const status = document.getElementById("status");
      const host = document.getElementById("graph");
      const tip = document.getElementById("tooltip");
      const dashBody = document.getElementById("dash-body");
      const dashTabs = document.getElementById("dash-tabs");
      const dashTitle = document.getElementById("dash-title");
      const dashMeta = document.getElementById("dash-meta");
      const dashStatus = document.getElementById("dash-status");
      const chartEl = document.getElementById("plotly-chart");
      const headerHint = document.getElementById("header-hint");
      const closeBtn = document.getElementById("close-dash");
      status.style.display = "none";

      const categories = graph.nodes.filter((n) => n.node_type === "category");
      if (!categories.length) {
        status.style.display = "grid";
        status.classList.add("error");
        status.textContent = "No category node found in router graph";
        return;
      }

      let activeCategory = categories[0];
      let endpoints = endpointsForCategory(graph, activeCategory);
      let activeEndpointId = null;
      let loadSeq = 0;

      let svg = d3.select(host)
        .append("svg")
        .attr("aria-label", "Category nodes for router graph");

      let g = svg.append("g");
      let nodeSel = null;

      function categoryPositions(width, height) {
        const n = categories.length;
        if (n === 1) return [{ x: width / 2, y: height / 2 }];
        const cx = width / 2;
        const cy = height / 2;
        const r = Math.min(width, height) * 0.22;
        return categories.map((_, i) => {
          const a = (Math.PI * 2 * i) / n - Math.PI / 2;
          return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
        });
      }

      function layout() {
        const width = host.clientWidth || 800;
        const height = host.clientHeight || 560;
        svg.attr("viewBox", [0, 0, width, height]);
        const positions = categoryPositions(width, height);
        if (nodeSel) {
          nodeSel.attr("transform", (d, i) => {
            const p = positions[i] || { x: width / 2, y: height / 2 };
            return `translate(${p.x},${p.y})`;
          });
        }
        if (shell.classList.contains("is-split") && chartEl.data) {
          Plotly.Plots.resize(chartEl);
        }
      }

      function setDashStatus(msg, isError) {
        if (!msg) {
          dashStatus.hidden = true;
          dashStatus.textContent = "";
          dashStatus.classList.remove("error");
          return;
        }
        dashStatus.hidden = false;
        dashStatus.textContent = msg;
        dashStatus.classList.toggle("error", Boolean(isError));
      }

      function clearChart() {
        if (chartEl.data) Plotly.purge(chartEl);
      }

      function buildTabs() {
        dashTabs.innerHTML = "";
        endpoints.forEach((ep) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "dash-tab";
          btn.dataset.id = String(ep.id);
          btn.textContent = shortLabel(ep.intent);
          btn.title = ep.description || ep.url || ep.intent;
          btn.addEventListener("click", () => loadEndpoint(ep));
          dashTabs.appendChild(btn);
        });
        dashTabs.hidden = !endpoints.length;
      }

      function markActiveTab(ep) {
        dashTabs.querySelectorAll(".dash-tab").forEach((btn) => {
          btn.classList.toggle("is-active", btn.dataset.id === String(ep.id));
        });
      }

      async function loadEndpoint(ep) {
        if (!ep || !ep.url) {
          setDashStatus("Endpoint has no URL", true);
          return;
        }
        activeEndpointId = ep.id;
        markActiveTab(ep);
        dashTitle.textContent = shortLabel(ep.intent);
        dashMeta.textContent = ep.url;
        setDashStatus("Loading Plotly chart…");
        clearChart();

        const seq = ++loadSeq;
        const method = (ep.method || "post").toUpperCase();
        try {
          const res = await fetch(ep.url, {
            method,
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: method === "GET" ? undefined : JSON.stringify({
              message: `Show ${ep.intent} for ${category.intent}`,
              response_format: "json",
            }),
          });
          if (seq !== loadSeq) return;
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const payload = await res.json();
          if (payload && payload.panel) {
            setDashStatus("");
            clearChart();
            const rows = (payload.panel.rows || [])
              .map(([k, v]) => `<tr><td>${k}</td><td><code>${v ?? ""}</code></td></tr>`)
              .join("");
            chartEl.innerHTML =
              `<div style="padding:1rem;overflow:auto;height:100%">` +
              `<h3>${payload.panel.title || "Settings"} ` +
              `${payload.panel.ready ? "✅ ready" : "⚠️ not ready"}</h3>` +
              `<p>${payload.panel.note || ""}</p>` +
              `<table>${rows}</table></div>`;
            return;
          }
          const fig = figureFromResponse(payload);
          if (!fig) throw new Error("Response had no plotly/plot payload");
          setDashStatus("");
          chartEl.innerHTML = "";
          await Plotly.newPlot(
            chartEl,
            fig.data,
            mergeAxisTheme(fig.layout),
            { responsive: true, displayModeBar: false },
          );
          requestAnimationFrame(() => Plotly.Plots.resize(chartEl));
        } catch (err) {
          if (seq !== loadSeq) return;
          clearChart();
          setDashStatus(
            `Failed to load ${shortLabel(ep.intent)}: ${err.message || err}. Is pixi run serve-viz / mat-gram api up?`,
            true,
          );
        }
      }

      nodeSel = g.selectAll("g.category")
        .data(categories, (d) => d.id)
        .join("g")
        .attr("class", (d) => `node category cat-${d.intent || d.id}`)
        .attr("role", "button")
        .attr("tabindex", 0)
        .attr("aria-label", (d) => `Open ${d.intent} endpoints`);

      nodeSel.append("circle").attr("r", 28);

      nodeSel.append("text")
        .attr("x", 0)
        .attr("y", 48)
        .attr("text-anchor", "middle")
        .text((d) => d.intent || String(d.id));

      nodeSel.append("text")
        .attr("class", "hint")
        .attr("x", 0)
        .attr("y", 66)
        .attr("text-anchor", "middle")
        .text((d) => (d.intent === "settings" ? "Open settings →" : "Open Plotly →"));

      function endpointIconId(ep) {
        const intent = String(ep.intent || "");
        if (intent.startsWith("solubility_")) return intent.slice("solubility_".length);
        if (intent.startsWith("settings_")) return intent.slice("settings_".length);
        return intent || String(ep.id);
      }

      function notifyParentIoIcons(category) {
        if (!(window.parent && window.parent !== window)) return false;
        const eps = endpointsForCategory(graph, category);
        window.parent.postMessage(
          {
            type: "string-therapy:open-category",
            category: category.intent,
            endpoints: eps.map((ep) => ({
              id: endpointIconId(ep),
              intent: ep.intent,
              url: ep.url,
              method: ep.method || "post",
            })),
          },
          "*",
        );
        return true;
      }

      function openDashboard(category) {
        tip.style.opacity = "0";
        activeCategory = category;
        endpoints = endpointsForCategory(graph, category);
        nodeSel.classed("is-active", (d) => d.id === category.id);

        // Embedded in the FastHTML app: hand off to parent io_icons / views.
        if (notifyParentIoIcons(category)) {
          headerHint.textContent = `Opened ${category.intent} in the app io icons`;
          return;
        }

        // Standalone /graph page: keep the in-page Plotly/settings split dashboard.
        shell.classList.add("is-split");
        headerHint.textContent = `Split view: left = graph · right = ${category.intent}`;
        dashBody.hidden = false;
        buildTabs();

        const preferred = endpoints.find((e) =>
          /start_max|load_weights|encode_pass|attention|parity|latent|molecular|roundtrip/i.test(e.intent)
        ) || endpoints[0];
        requestAnimationFrame(() => {
          layout();
          setTimeout(layout, 300);
        });
        if (preferred) loadEndpoint(preferred);
        else setDashStatus("No endpoints linked to this category", true);
      }

      function closeDashboard() {
        shell.classList.remove("is-split");
        nodeSel.classed("is-active", false);
        headerHint.textContent = "Touch a category node → open its endpoints";
        loadSeq += 1;
        activeEndpointId = null;
        clearChart();
        dashBody.hidden = true;
        dashTabs.hidden = true;
        dashTabs.innerHTML = "";
        dashMeta.textContent = "";
        setDashStatus("Select a visualization…");
        requestAnimationFrame(() => {
          layout();
          setTimeout(layout, 300);
        });
      }

      closeBtn.addEventListener("click", closeDashboard);

      nodeSel
        .on("click", (event, d) => {
          event.preventDefault();
          openDashboard(d);
        })
        .on("pointerup", (event, d) => {
          if (event.pointerType === "touch" || event.pointerType === "pen") {
            event.preventDefault();
            openDashboard(d);
          }
        })
        .on("keydown", (event, d) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openDashboard(d);
          }
        })
        .on("mousemove", (event, d) => {
          tip.innerHTML = tooltipHtml(d, endpointsForCategory(graph, d));
          tip.style.opacity = "1";
          const pad = 12;
          const x = Math.min(event.offsetX + pad, host.clientWidth - 280);
          const y = Math.min(event.offsetY + pad, host.clientHeight - 120);
          tip.style.left = `${Math.max(8, x)}px`;
          tip.style.top = `${Math.max(8, y)}px`;
        })
        .on("mouseleave", () => {
          tip.style.opacity = "0";
        });

      layout();
      window.addEventListener("resize", layout);
    }

    loadGraph()
      .then(render)
      .catch((err) => {
        const status = document.getElementById("status");
        status.classList.add("error");
        status.textContent = `Failed to load graph: ${err.message || err}`;
      });
  </script>
</body>
</html>
