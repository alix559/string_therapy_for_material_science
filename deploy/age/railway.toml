# Optional Railway config-as-code. For local use, prefer docker-compose.yml.
# If deploying this service from a monorepo root on Railway, point Settings →
# Config as Code here, or set Root Directory to deploy/age.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
